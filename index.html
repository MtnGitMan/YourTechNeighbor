<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Tech Neighbor — Coming Soon</title>
<meta name="description" content="Your Tech Neighbor — tech solutions for homes and small business in Seneca, SC. Site launching soon.">
<link rel="icon" type="image/png" href="logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #101826;
    --slate: #4A5568;
    --paper: #EAEEF0;
    --surface: #FBFCFB;
    --line: #C9D2D6;
    --copper: #BE6A2D;
    --copper-tint: #F4E3D3;
    --phosphor: #2F9E71;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    background-image:
      linear-gradient(90deg, rgba(16,24,38,0.035) 1px, transparent 1px),
      linear-gradient(0deg, rgba(16,24,38,0.035) 1px, transparent 1px);
    background-size: 34px 34px;
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--ink);
    padding: 1.5rem;
  }
  .card {
    max-width: 460px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 6px solid var(--copper);
    border-radius: 6px;
    box-shadow: 0 18px 40px -24px rgba(16,24,38,0.35);
    overflow: hidden;
    text-align: center;
  }
  .stub {
    background: var(--copper-tint);
    padding: 0.9rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--phosphor);
  }
  .mono {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--copper);
  }
  .body {
    padding: 2rem 2rem 2.25rem;
  }
  img.logo {
    width: 56px;
    height: 56px;
    margin-bottom: 1rem;
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.5rem;
    margin: 0 0 0.75rem;
  }
  p {
    color: var(--slate);
    line-height: 1.6;
    margin: 0 0 1.5rem;
    font-size: 0.98rem;
  }
  .contact {
    border-top: 1px solid var(--line);
    padding-top: 1.25rem;
    font-size: 0.95rem;
  }
  .contact a {
    color: var(--ink);
    text-decoration: none;
    font-weight: 600;
  }
  .contact a:hover { color: var(--copper); }
  .contact div { margin-bottom: 0.5rem; }
</style>
</head>
<body>

<div class="card">
  <div class="stub">
    <span class="status-dot"></span>
    <span class="mono">Site under construction</span>
  </div>
  <div class="body">
    <img class="logo" src="logo.png" alt="" width="56" height="56">
    <h1>Your Tech Neighbor</h1>
    <p>The full site is on the way. In the meantime, still taking on projects — reach out directly below.</p>
    <div class="contact">
      <div><a href="tel:+18287671587">(828) 767-1587</a></div>
      <div><a href="mailto:hello@asktechneighbor.com">hello@asktechneighbor.com</a></div>
    </div>
  </div>
</div>

</body>
</html>
